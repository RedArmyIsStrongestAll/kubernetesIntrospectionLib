apiVersion: v1
kind: ServiceAccount
metadata:
  name: # name 1 — name ServiceAccount
  namespace: # namespace 1

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: # namespace 1
  name: # name 2 — name Role
rules:
  # checkPodResources
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "get", "list", "watch" ]

  # checkOwnerResources
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "apps" ]
    resources: [ "statefulsets" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "apps" ]
    resources: [ "daemonsets" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "apps" ]
    resources: [ "replicasets" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "" ]
    resources: [ "replicationcontrollers" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "batch" ]
    resources: [ "jobs" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "batch" ]
    resources: [ "cronjobs" ]
    verbs: [ "get", "list", "watch" ]

  # checkServiceResources
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]

  # checkConfigResources
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: # name 3 — name RoleBinding
  namespace: # namespace 1
subjects:
  - kind: ServiceAccount
    name: # name 1 — name ServiceAccount
    namespace: # namespace 1
roleRef:
  kind: Role
  name: # name 2 — name Role
  apiGroup: rbac.authorization.k8s.io