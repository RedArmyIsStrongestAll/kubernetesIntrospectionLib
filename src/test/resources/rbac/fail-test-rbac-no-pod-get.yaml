apiVersion: v1
kind: ServiceAccount
metadata:
  name: introspection-sa
  namespace: test-namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: test-namespace
  name: introspection-role
rules:
  # checkPodResources
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "list" ]


  # checkOwnerResources
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "apps" ]
    resources: [ "statefulsets" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "apps" ]
    resources: [ "daemonsets" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "apps" ]
    resources: [ "replicasets" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "" ]
    resources: [ "replicationcontrollers" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "batch" ]
    resources: [ "jobs" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "batch" ]
    resources: [ "cronjobs" ]
    verbs: [ "get", "list", "watch" ]

  # checkServiceResources
  - apiGroups: [ "" ]
    resources: [ "services" ]
    verbs: [ "get", "list", "watch" ]

  # checkServiceResources
  - apiGroups: [ "" ]
    resources: [ "configmaps" ]
    verbs: [ "get", "list", "watch" ]

  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "get", "list", "watch" ]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: introspection-rolebinding
  namespace: test-namespace
subjects:
  - kind: ServiceAccount
    name: introspection-sa
    namespace: test-namespace
roleRef:
  kind: Role
  name: introspection-role
  apiGroup: rbac.authorization.k8s.io