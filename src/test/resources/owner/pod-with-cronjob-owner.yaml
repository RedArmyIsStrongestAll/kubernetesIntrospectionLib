apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: test-namespace
  labels:
    app: test-app
    env: prod
  ownerReferences:
    - apiVersion: batch/v1
      kind: CronJob
      name: test-cronjob
      uid: 12345
      controller: true
spec:
  containers:
    - name: main-app
      image: my-app:1.0
status:
  phase: Running
  podIP: 10.244.0.1
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob
  namespace: test-namespace
  labels:
    app: test-cronjob
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: test-cronjob
        spec:
          template:
            spec:
              containers:
                - name: main-app
                  image: my-app:1.0