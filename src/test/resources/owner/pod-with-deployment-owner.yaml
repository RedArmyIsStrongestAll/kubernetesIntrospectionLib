apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: test-namespace
  labels:
    app: test-app
    env: prod
  ownerReferences:
    - apiVersion: apps/v1
      kind: Deployment
      name: test-deployment
      uid: 12345
      controller: true
spec:
  containers:
    - name: main-app
      image: my-app:1.0
status:
  phase: Running
  podIP: 10.244.0.1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
  namespace: test-namespace
  labels:
    app: test-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
        - name: main-app
          image: my-app:1.0