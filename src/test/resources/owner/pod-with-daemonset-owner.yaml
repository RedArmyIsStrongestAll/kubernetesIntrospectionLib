apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: test-namespace
  labels:
    app: test-app
    env: prod
  ownerReferences:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: test-daemonset
      uid: 12345
      controller: true
spec:
  containers:
    - name: main-app
      image: my-app:1.0
status:
  phase: Running
  podIP: 10.244.0.1
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: test-daemonset
  namespace: test-namespace
  labels:
    app: test-daemonset
spec:
  selector:
    matchLabels:
      app: test-daemonset
  template:
    metadata:
      labels:
        app: test-daemonset
    spec:
      containers:
        - name: main-app
          image: my-app:1.0
status:
  currentNumberScheduled: 3
  desiredNumberScheduled: 3
  numberAvailable: 3
  numberReady: 3