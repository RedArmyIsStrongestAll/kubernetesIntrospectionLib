apiVersion: v1
kind: Endpoints
metadata:
  name: test-service
  namespace: test-namespace
subsets:
  - addresses:
      - ip: 10.1.0.1
        targetRef:
          kind: Pod
          name: pod-1
    notReadyAddresses:
      - ip: 10.1.0.3
        targetRef:
          kind: Pod
          name: pod-3
    ports:
      - name: http
        port: 80
        protocol: TCP