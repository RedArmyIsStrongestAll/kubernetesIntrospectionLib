apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: test-namespace
  labels:
    app: my-app
    env: prod
    version: "1.0"
    team: backend
    role: api-server
  annotations:
    owner: dev-team
    description: "Pod for testing all Kubernetes introspection strategies"
spec:
  hostname: test-pod-full-info
  subdomain: default-subdomain
  containers:
    - name: main-app
      image: my-app:1.0
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "echo Hello from Pod; sleep 3600"]
      ports:
        - containerPort: 8080
          protocol: TCP
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  serviceAccountName: default
status:
  phase: Running
  podIP: 10.244.0.1
  podIPs:
    - ip: 10.244.0.1
  startTime: "2024-10-01T10:00:00Z"