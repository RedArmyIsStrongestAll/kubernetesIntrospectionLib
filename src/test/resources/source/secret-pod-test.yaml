apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: test-namespace
spec:
  containers:
    - name: main
      image: nginx
      env:
        - name: ENV1
          valueFrom:
            secretKeyRef:
              name: secret-env
              key: key1
      envFrom:
        - secretRef:
            name: secret-envfrom1
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/secrets
    - name: sidecar
      image: busybox
      envFrom:
        - secretRef:
            name: secret-envfrom2
      args:
        - sleep
        - "3600"
  volumes:
    - name: secret-volume
      secret:
        secretName: secret-volume
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-env
  namespace: test-namespace
type: Opaque
data:
  key1: dmFsdWUx
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-envfrom1
  namespace: test-namespace
type: Opaque
data:
  key2: dmFsdWUy
  key3: dmFsdWUz
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-envfrom2
  namespace: test-namespace
type: Opaque
data:
  key4: dmFsdWU0
  key5: dmFsdWU1
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-volume
  namespace: test-namespace
type: Opaque
data:
  key6: dmFsdWU2